# OpenConversation local development infrastructure
# Services: Whisper (speech-to-text), Ollama (LLM), PostgreSQL, backend (Kotlin/Spring Boot), webapp (Vite/React)
#
# Usage:
#   cp .env.example .env
#   infra/setup-audio-volume.sh
#   docker compose -f infra/docker-compose.yml up

services:
  whisper:
    build:
      context: https://github.com/ggml-org/whisper.cpp.git#v1.9.1
      dockerfile: .devops/main.Dockerfile
    image: whisper
    container_name: openconversation-whisper
    ports:
      - "8080:8080"
    volumes:
      # Bind mount for downloaded Whisper models
      - ./models:/models
      # Entrypoint that downloads the model if missing before starting the server
      - ./whisper-entrypoint.sh:/whisper-entrypoint.sh:ro
    # Override the default image command with our model-check entrypoint
    command: ["/whisper-entrypoint.sh"]
    networks:
      - openconversation
    healthcheck:
      # Treat any HTTP response from /inference as healthy (server is listening)
      test:
        [
          "CMD-SHELL",
          "wget --server-response --quiet --output-document=/dev/null http://localhost:8080/inference 2>&1 | grep -q 'HTTP/'",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: openconversation-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env and fill it in.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env and fill it in.}
      POSTGRES_DB: ${POSTGRES_DB:-conversation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - openconversation
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.5.7
    container_name: openconversation-ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      # Named volume for downloaded Ollama models
      - ${OLLAMA_MODEL_PATH:-/usr/share/ollama/.ollama}:/root/.ollama
      # Entrypoint that pulls the model if missing before marking the server ready
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    # Override the default image entrypoint with our model-pull entrypoint
    entrypoint: ["/ollama-entrypoint.sh"]
    networks:
      - openconversation
    healthcheck:
      # Verify the Ollama server is responding and the model is loaded
      test:
        [
          "CMD-SHELL",
          "ollama list >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        APP_UID: ${AUDIO_STORAGE_UID:-1000}
        APP_GID: ${AUDIO_STORAGE_GID:-1000}
    container_name: openconversation-backend
    user: "${AUDIO_STORAGE_UID:-1000}:${AUDIO_STORAGE_GID:-1000}"
    depends_on:
      postgres:
        condition: service_healthy
      whisper:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-conversation}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      WHISPER_BASE_URL: http://whisper:8080
      AUDIO_STORAGE_LOCAL_BASE_PATH: /app/audios
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:3b}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
    volumes:
      # Bind mount for persisted audio files
      - ./audios:/app/audios
    ports:
      - "8081:8081"
    networks:
      - openconversation
    restart: unless-stopped

  webapp:
    build:
      context: ../webapp
      dockerfile: Dockerfile
    container_name: openconversation-webapp
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    networks:
      - openconversation
    restart: unless-stopped

networks:
  openconversation:
    driver: bridge

volumes:
  postgres_data:
