spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/conversation}
    username: ${SPRING_DATASOURCE_USERNAME:conversation}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me-in-production}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

server:
  port: 8081

openconversation:
  whisper:
    base-url: ${WHISPER_BASE_URL:http://localhost:8080}
  llm:
    base-url: ${LLM_BASE_URL:http://ollama:11434/v1}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:llama3.2:3b}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:120}
  audio-storage:
    local:
      base-path: ${AUDIO_STORAGE_LOCAL_BASE_PATH:/app/audios}
